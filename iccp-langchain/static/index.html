<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCP - 多Agent内容创作平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        select, textarea, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        select:focus, textarea:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .row {
                grid-template-columns: 1fr;
            }
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-header h3 {
            color: #333;
            font-size: 18px;
        }

        .result-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
        }

        .meta-item {
            background: white;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        .result-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
            border: 1px solid #e0e0e0;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .copy-btn.copied {
            background: #22c55e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 ICCP - 多Agent内容创作平台</h1>
            <p>基于 LangGraph 的动态智能内容创作系统</p>
        </div>

        <div class="content">
            <form id="contentForm">
                <div class="form-group">
                    <label for="category">内容板块 *</label>
                    <select id="category" required>
                        <option value="finance">财经</option>
                        <option value="ai">人工智能</option>
                        <option value="lifestyle">生活</option>
                        <option value="tech">科技</option>
                        <option value="books">书籍</option>
                        <option value="investment">投资</option>
                        <option value="growth">成长</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="topic">主题 *</label>
                    <input type="text" id="topic" placeholder="例如：2024年AI发展趋势" required>
                </div>

                <div class="form-group">
                    <label for="requirements">额外要求（可选）</label>
                    <textarea id="requirements" placeholder="例如：需要引用最新论文和数据"></textarea>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="length">内容长度</label>
                        <select id="length">
                            <option value="short">短篇 (500-800字)</option>
                            <option value="medium" selected>中篇 (1000-1500字)</option>
                            <option value="long">长篇 (2000-3000字)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="style">内容风格</label>
                        <select id="style">
                            <option value="casual">轻松友好</option>
                            <option value="professional" selected>专业严谨</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    开始创作
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>AI正在思考中，请稍候...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="result-section" id="resultSection">
                <div class="result-header">
                    <h3>生成的内容</h3>
                    <button class="copy-btn" id="copyBtn">复制内容</button>
                </div>
                <div class="result-meta" id="resultMeta"></div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';

        const form = document.getElementById('contentForm');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const resultSection = document.getElementById('resultSection');
        const resultContent = document.getElementById('resultContent');
        const resultMeta = document.getElementById('resultMeta');
        const submitBtn = document.getElementById('submitBtn');
        const copyBtn = document.getElementById('copyBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 隐藏之前的结果和错误
            resultSection.classList.remove('show');
            error.classList.remove('show');
            
            // 显示加载状态
            loading.classList.add('show');
            submitBtn.disabled = true;

            const data = {
                category: document.getElementById('category').value,
                topic: document.getElementById('topic').value,
                requirements: document.getElementById('requirements').value || null,
                length: document.getElementById('length').value,
                style: document.getElementById('style').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/content/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.detail || '请求失败');
                }

                if (result.success) {
                    // 显示结果
                    resultContent.textContent = result.content;
                    
                    // 显示元数据
                    resultMeta.innerHTML = `
                        <div class="meta-item">🤖 Agent: ${result.agent}</div>
                        <div class="meta-item">🧭 路由: ${result.agent_selected || '-'}</div>
                        <div class="meta-item">🔧 工具: ${result.tools_used.join(', ') || '无'}</div>
                        <div class="meta-item">🔄 迭代: ${result.iterations}次</div>
                        <div class="meta-item">✅ 质检: ${result.quality_gate_passed ? '通过' : '触发修订'}</div>
                        <div class="meta-item">📝 质检说明: ${result.quality_gate_reason || '-'}</div>
                        <div class="meta-item">🧵 轨迹: ${(result.execution_trace || []).join(' -> ') || '-'}</div>
                    `;
                    
                    resultSection.classList.add('show');
                } else {
                    throw new Error(result.error || '生成失败');
                }

            } catch (err) {
                error.textContent = `错误: ${err.message}`;
                error.classList.add('show');
            } finally {
                loading.classList.remove('show');
                submitBtn.disabled = false;
            }
        });

        copyBtn.addEventListener('click', async () => {
            const text = resultContent.textContent;
            try {
                await navigator.clipboard.writeText(text);
                copyBtn.textContent = '已复制！';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '复制内容';
                    copyBtn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                alert('复制失败，请手动复制');
            }
        });

        // 检查API连接
        async function checkAPI() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                if (!response.ok) {
                    throw new Error('API未连接');
                }
            } catch (err) {
                error.textContent = `⚠️ 无法连接到API服务器 (${API_BASE_URL})，请确保后端服务已启动`;
                error.classList.add('show');
            }
        }

        // 页面加载时检查
        checkAPI();
    </script>
</body>
</html>
